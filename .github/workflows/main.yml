name: CI Pipeline

on: [push, pull_request] # Запускати при кожному оновленні коду

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    
    # 3. Мультиверсійне тестування (запуститься для 3 версій)
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - name: Завантаження коду
      uses: actions/checkout@v4

    - name: Встановлення Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Встановлення залежностей
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 2. Перевірка стилю коду (Linting)
    - name: Linting з Flake8
      run: flake8 . --count --exit-zero --max-line-length=120 --statistics

    # 1 та 5. Тестування (Pytest) та генерація HTML-звіту
    - name: Запуск тестів з Pytest
      run: pytest --html=report-${{ matrix.python-version }}.html --self-contained-html

    # Збереження HTML-звіту
    - name: Завантаження HTML-звіту
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pytest-report-${{ matrix.python-version }}
        path: report-${{ matrix.python-version }}.html

  # 4. Збірка Docker-контейнера
  build-docker:
    runs-on: ubuntu-latest
    needs: test-and-lint # Чекає, поки пройдуть тести
    steps:
    - name: Завантаження коду
      uses: actions/checkout@v4

    - name: Збірка Docker-контейнера
      run: docker build -t my-minimal-app .
